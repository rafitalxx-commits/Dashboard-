<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard Tareas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --panel: #0f172a;
      --panel-2: #111827;
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #1d4ed8;
      --accent-2: #60a5fa;
      --danger: #ef4444;
      --ok: #22c55e;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    .app-shell { display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 96px; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 16px; border-bottom: 1px solid var(--border); background: rgba(15,23,42,0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 10;
    }
    .brand { font-weight: 700; font-size: 18px; letter-spacing: 0.2px; }
    .top-actions { display: inline-flex; gap: 8px; }

    .segmented {
      display: inline-flex; gap: 8px; padding: 6px; border: 1px solid var(--border); border-radius: 999px; background: rgba(255,255,255,0.04);
    }
    .segmented button {
      border: none; background: transparent; color: inherit; padding: 8px 12px; border-radius: 999px; cursor: pointer; font-weight: 500; font-size: 14px; color: var(--muted);
    }
    .segmented button.active { background: var(--accent); color: white; }

    .page { padding: 16px; display: none; flex-direction: column; gap: 16px; }
    .page.active { display: flex; }

    .section { display: flex; flex-direction: column; gap: 10px; }
    .section-title { font-weight: 600; color: #e2e8f0; font-size: 15px; }

    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer;
      display: flex; flex-direction: column; gap: 6px;
    }
    .card:active { transform: scale(0.995); }

    .rows { display: flex; flex-direction: column; gap: 10px; }
    .row {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px;
      display: grid; grid-template-columns: 24px 1fr auto; gap: 10px; align-items: center; cursor: pointer;
    }
    .row input { width: 22px; height: 22px; accent-color: var(--accent); }
    .row-title { font-weight: 500; font-size: 14px; }
    .row-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; color: var(--muted); font-size: 12px; }

    .search {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .search input, .input {
      width: 100%; background: var(--panel); color: inherit; border: 1px solid var(--border); padding: 12px 14px; border-radius: 10px; font-size: 16px;
    }

    .chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; align-items: center; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); white-space: nowrap; min-height: 40px; font-size: 14px; color: var(--muted);
    }
    .chip.active { background: var(--accent); border-color: var(--accent); color: white; }

    .fab {
      position: fixed; right: 18px; bottom: 84px; width: 56px; height: 56px; border-radius: 999px; border: none; background: var(--accent); color: white; font-size: 28px; line-height: 56px; text-align: center; box-shadow: 0 8px 24px rgba(29,78,216,0.35); cursor: pointer; z-index: 8;
    }

    .bottom-nav {
      position: fixed; left: 0; right: 0; bottom: 0; padding: env(safe-area-inset-bottom, 10px) 8px 10px; display: flex; justify-content: space-between; gap: 6px; border-top: 1px solid var(--border); background: rgba(15,23,42,0.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); z-index: 20;
    }
    .bottom-nav button {
      flex: 1; display: inline-flex; flex-direction: column; align-items: center; gap: 4px; border: none; background: transparent; color: var(--muted); padding: 8px 6px; min-height: 48px; font-size: 11px;
    }
    .bottom-nav button.active { color: var(--accent-2); }
    .bottom-nav button span { font-size: 20px; }

    .empty-state { color: var(--muted); font-size: 14px; padding: 10px 0; }

    .mail-item { background: var(--panel); border: 1px solid var(--border); padding: 12px; border-radius: 10px; }
    .mail-item-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .mail-from { color: var(--text); font-weight: 600; }
    .mail-subject { font-weight: 600; color: var(--text); margin-top: 6px; }
    .mail-snippet { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .quick-actions { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .quick-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; text-align: left;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .quick-title { font-weight: 600; color: var(--text); }
    .quick-count { font-weight: 700; color: var(--warn); font-size: 18px; }

    .attach-card { display: flex; justify-content: space-between; align-items: center; gap: 8px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 10px; border-radius: 10px; font-size: 13px; color: var(--text); }
    .upload-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px; border: 1px dashed var(--border); color: var(--muted); font-size: 13px; cursor: pointer; background: rgba(255,255,255,0.02); }

    .sheet-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.72); display: none; align-items: flex-end; justify-content: center; padding-bottom: env(safe-area-inset-bottom, 12px); z-index: 12; }
    .sheet-backdrop.open { display: flex; }
    .sheet { background: #0b1120; border: 1px solid var(--border); border-radius: 14px 14px 0 0; width: 100vw; max-width: 100vw; padding: 18px; display: flex; flex-direction: column; gap: 12px; max-height: 92vh; overflow-y: auto; }
    .sheet-header { font-weight: 700; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
    .actions { display: flex; justify-content: stretch; gap: 10px; }
    .actions .button { flex: 1; text-align: center; }
    .button, .ghost {
      border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: inherit; padding: 12px 14px; border-radius: 10px; cursor: pointer; min-height: 44px; font-size: 15px;
    }
    .button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .close { border: none; background: transparent; color: inherit; font-size: 18px; padding: 4px 8px; border-radius: 8px; }

    .calendar { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
    .calendar-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .calendar-head h3 { margin: 0; font-size: 14px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .dow { text-align: center; font-size: 10px; color: var(--muted); padding-bottom: 4px; }
    .day {
      aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--border);
      background: #0c0f14; padding: 6px; display: flex; flex-direction: column; gap: 3px; overflow: hidden;
    }
    .day:hover { border-color: rgba(255,255,255,0.25); }
    .day.empty { background: transparent; border-color: transparent; }
    .day-num { font-size: 11px; color: var(--muted); }
    .ev {
      font-size: 10px; padding: 2px 4px; border-radius: 4px;
      background: rgba(37,99,235,0.25); color: #e5eaff;
      border: 1px solid rgba(37,99,235,0.35);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .hint { color: var(--muted); font-size: 12px; margin-top: 8px; }

    @media (min-width: 640px) {
      .quick-actions { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="brand">Tareas</div>
        <div style="color:var(--muted);font-size:12px">Prototipo · Dark</div>
      </div>
      <div class="top-actions">
        <div class="segmented">
          <button class="active" data-view="lista">Lista</button>
          <button data-view="calendario">Calendario</button>
        </div>
      </div>
    </header>

    <main>
      <!-- Inicio -->
      <section id="inicio" class="page active">
        <div class="section">
          <div class="section-title">📧 Correo · INBOX no leídos</div>
          <div id="inbox-list" class="rows">Cargando correo...</div>
        </div>
        <div class="section">
          <div class="section-title">Accesos directos</div>
          <div class="quick-actions">
            <button class="quick-card" onclick="switchTab('tareas'); setTimeout(applyFilter('hoy'),0)">
              <span class="quick-title">📅 Tareas de hoy</span>
              <span class="quick-count" id="count-hoy">0</span>
            </button>
            <button class="quick-card" onclick="switchTab('tareas'); setTimeout(applyFilter('vencidas'),0)">
              <span class="quick-title">⏰ Vencidas</span>
              <span class="quick-count" id="count-vencidas">0</span>
            </button>
            <button class="quick-card" onclick="switchTab('calendario')">
              <span class="quick-title">🗓 Calendario</span>
            </button>
          </div>
        </div>
        <div class="section">
          <div class="section-title">Tareas de hoy</div>
          <div id="today-list" class="rows">Cargando...</div>
        </div>
        <div class="section">
          <div class="section-title">Vencidas</div>
          <div id="overdue-list" class="rows">Cargando...</div>
        </div>
        <div class="section">
          <div class="section-title">Urgentes</div>
          <div id="urgent-list" class="rows">Cargando...</div>
        </div>
      </section>

      <!-- Tareas -->
      <section id="tareas" class="page">
        <div class="section">
          <div class="search">
            <input id="search-input" placeholder="Buscar tarea, proyecto o responsable..." />
          </div>
          <div class="chips">
            <button class="chip active" data-filter="todos">Todos</button>
            <button class="chip" data-filter="hoy">Hoy</button>
            <button class="chip" data-filter="vencidas">Vencidas</button>
            <button class="chip" data-filter="urgentes">Urgentes</button>
            <button class="chip" data-filter="completadas">Completadas</button>
          </div>
        </div>
        <div id="tasks-list" class="rows">Cargando tareas...</div>
      </section>

      <!-- Calendario -->
      <section id="calendario" class="page">
        <div class="calendar">
          <div class="calendar-head">
            <button class="ghost" id="cal-prev">←</button>
            <h3 id="cal-title">Julio 2026</h3>
            <button class="ghost" id="cal-next">→</button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
          <div id="calendar-events" class="rows" style="margin-top:12px"></div>
          <div class="hint">Calendario sincronizado con tu cuenta de Google Calendar</div>
        </div>
      </section>
    </main>

    <button class="fab" id="fab" type="button">＋</button>
    <nav class="bottom-nav" id="bottom-nav">
      <button class="active" data-tab="inicio"><span>🏠</span><span>Inicio</span></button>
      <button data-tab="tareas"><span>✅</span><span>Tareas</span></button>
      <button data-tab="calendario"><span>📅</span><span>Calendario</span></button>
      <button data-tab="proyectos"><span>📂</span><span>Proyectos</span></button>
      <button data-tab="equipo"><span>👥</span><span>Equipo</span></button>
    </nav>
  </div>

  <div id="sheet" class="sheet-backdrop">
    <form class="sheet" id="quick-form">
      <div class="sheet-header">
        <span>Creación rápida</span>
        <button class="ghost close" id="sheet-close" type="button">×</button>
      </div>
      <input class="input" id="q-title" placeholder="Tarea rápida" />
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <label style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted)">
          Fecha
          <input class="input" id="q-date" type="date" />
        </label>
        <label style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted)">
          Prioridad
          <select class="input" id="q-priority">
            <option>Crítica</option><option selected>Alta</option><option>Media</option><option>Baja</option>
          </select>
        </label>
      </div>
      <div class="actions">
        <button class="ghost" id="sheet-cancel" type="button">Cancelar</button>
        <button class="button primary" type="submit">Guardar</button>
      </div>
    </form>
  </div>

  <script>
    const state = {
      tab: 'inicio',
      filter: 'todos',
      query: '',
      tasks: [],
      inbox: [],
      calYear: 2026,
      calMonth: 6,
      calEvents: []
    };

    function $(id) { return document.getElementById(id); }

    function switchTab(tab) {
      state.tab = tab;
      document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === tab));
      document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      if (tab === 'calendario') renderCalendar();
      if (tab === 'tareas') renderTasks();
    }

    document.getElementById('bottom-nav').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-tab]');
      if (!btn) return;
      switchTab(btn.dataset.tab);
    });

    document.querySelector('.segmented').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-view]');
      if (!btn) return;
      document.querySelectorAll('.segmented button').forEach(b => b.classList.toggle('active', b === btn));
      if (btn.dataset.view === 'calendario') switchTab('calendario');
      else switchTab('tareas');
    });

    function today() { return new Date().toISOString().slice(0, 10); }
    function shift(days) { const d = new Date(); d.setDate(d.getDate() + days); return d.toISOString().slice(0, 10); }

    const priorityWeight = p => ({ 'Crítica': 0, 'Alta': 1, 'Media': 2, 'Baja': 3 }[p] ?? 4);
    const pillFor = s => ({ 'En curso': 'activo', 'Pendiente': 'pendiente', 'En revisión': 'revision', 'Listo': 'listo', 'Cerrado': 'cerrado' }[s] || 'pendiente');

    function renderTaskRow(task) {
      const row = document.createElement('div');
      row.className = 'row';
      const checked = ['Listo','Cerrado','Completada','Hecha'].includes(task.status);
      row.innerHTML = `
        <input type="checkbox" ${checked ? 'checked' : ''} />
        <div>
          <div class="row-title" style="${checked ? 'text-decoration:line-through;color:var(--muted)' : ''}">${escapeHtml(task.title)}</div>
          <div class="row-meta">
            <span class="chip">${escapeHtml(task.category)}</span>
            <span class="chip">${escapeHtml(task.priority)}</span>
            ${task.dueDate ? `<span>📅 ${task.dueDate}</span>` : ''}
          </div>
        </div>
        <button class="chip ${pillFor(task.status)}">${task.status}</button>
      `;
      row.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT') return;
        openDetail(task);
      });
      return row;
    }

    function openDetail(task) {
      const detail = prompt('Detalle de tarea:\n\nTítulo: ' + task.title + '\n\nEscribe aquí notas, enlaces o indicaciones:', task.detail || '');
      if (detail === null) return;
      const files = [];
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.multiple = true;
      fileInput.accept = 'image/*,.pdf,.doc,.docx,.xls,.xlsx,.zip';
      const addFiles = () => {
        Array.from(fileInput.files || []).forEach(file => {
          const reader = new FileReader();
          reader.onload = () => files.push({ name: file.name, dataUrl: reader.result });
          reader.readAsDataURL(file);
        });
      };
      fileInput.addEventListener('change', () => {}); // vacío intencional: capturamos al confirmar
      fileInput.click();
      const patch = { detail: detail || '', attachments: files.map(f => f.dataUrl) };
      fetch('/api/tasks/' + encodeURIComponent(task.id), { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(patch) }).catch(() => {});
    }

    function renderTasks() {
      const container = $('tasks-list');
      container.innerHTML = '';
      const q = state.query.trim().toLowerCase();
      let list = state.tasks.filter(t => {
        if (state.filter === 'hoy') return t.dueDate === today();
        if (state.filter === 'vencidas') return t.dueDate && t.dueDate < today() && !['Listo','Cerrado','Completada','Hecha'].includes(t.status);
        if (state.filter === 'urgentes') return ['Crítica','Alta'].includes(t.priority);
        if (state.filter === 'completadas') return ['Listo','Cerrado','Completada','Hecha'].includes(t.status);
        return true;
      });
      if (q) {
        list = list.filter(t => `${t.title} ${t.detail} ${t.assignee || ''} ${t.category || ''}`.toLowerCase().includes(q));
      }
      list.sort((a, b) => {
        const aDone = ['Listo','Cerrado','Completada','Hecha'].includes(a.status) ? 1 : 0;
        const bDone = ['Listo','Cerrado','Completada','Hecha'].includes(b.status) ? 1 : 0;
        if (aDone !== bDone) return aDone - bDone;
        return priorityWeight(a.priority) - priorityWeight(b.priority);
      });
      if (!list.length) { container.innerHTML = '<div class="empty-state">No hay tareas para este filtro.</div>'; return; }
      list.forEach(task => container.appendChild(renderTaskRow(task)));
    }

    $('search-input').addEventListener('input', (e) => { state.query = e.target.value; renderTasks(); });

    function applyFilter(f) {
      state.filter = f;
      document.querySelectorAll('.chip[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      renderTasks();
    }
    document.querySelectorAll('.chip[data-filter]').forEach(btn => btn.addEventListener('click', () => {
      applyFilter(btn.dataset.filter);
    }));

    function renderCalendar() {
      const grid = $('calendar-grid');
      grid.innerHTML = '';
      const year = state.calYear; const month = state.calMonth;
      const first = new Date(year, month, 1);
      const start = new Date(first);
      start.setDate(start.getDate() - ((first.getDay() + 6) % 7));
      const dow = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
      dow.forEach(d => { const el = document.createElement('div'); el.className='dow'; el.textContent=d; grid.appendChild(el); });
      for (let i = 0; i < 35; i++) {
        const d = new Date(start); d.setDate(start.getDate() + i);
        const dayNum = d.getDate();
        const cell = document.createElement('div');
        cell.className = 'day';
        const num = document.createElement('div'); num.className='day-num'; num.textContent=dayNum; cell.appendChild(num);
        const evts = state.calEvents.filter(e => {
          const sd = new Date(e.start); const ed = new Date(e.end); const cd = new Date(d); cd.setHours(0,0,0,0); sd.setHours(0,0,0,0); ed.setHours(0,0,0,0);
          return cd >= sd && cd <= ed;
        });
        evts.slice(0,2).forEach(ev => {
          const tag = document.createElement('div'); tag.className='ev'; tag.textContent=ev.title; cell.appendChild(tag);
        });
        grid.appendChild(cell);
      }
      const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      $('cal-title').textContent = monthNames[month] + ' ' + year;
      const evList = $('calendar-events'); evList.innerHTML='';
      state.calEvents.forEach(ev => {
        const row = document.createElement('div'); row.className='row';
        row.innerHTML = `<div><div class="row-title">${escapeHtml(ev.title)}</div><div class="row-meta">📅 ${ev.start} → ${ev.end} ${ev.location ? '· 📍 '+escapeHtml(ev.location) : ''}</div></div>`;
        evList.appendChild(row);
      });
    }

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    async function loadData() {
      try {
        const [inboxRes, tasksRes, calendarRes] = await Promise.all([
          fetch('/api/inbox').then(r => r.ok ? r.json() : []).catch(() => []),
          fetch('/api/tasks').then(r => r.ok ? r.json().then(d => d.tasks || d) : []).catch(() => []),
          fetch('/api/calendar/events').then(r => r.ok ? r.json() : []).catch(() => [])
        ]);
        state.inbox = Array.isArray(inboxRes) ? inboxRes : (inboxRes?.messages ?? []);
        state.tasks = Array.isArray(tasksRes) ? tasksRes : [];
        state.calEvents = Array.isArray(calendarRes) ? calendarRes : [];
        renderHome();
        renderTasks();
      } catch (e) {
        console.error('loadData', e);
      }
    }

    function renderHome() {
      const container = $('inbox-list');
      container.innerHTML = '';
      const items = state.inbox.slice(0, 10);
      if (!items.length) { container.innerHTML = '<div class="empty-state">No tienes correos sin leer en INBOX.</div>'; }
      else {
        items.forEach((m, i) => {
          const el = document.createElement('div');
          el.className = 'mail-item';
          el.innerHTML = `
            <div class="mail-item-header"><span class="mail-from">${escapeHtml(m.from)}</span><span>${escapeHtml(m.date)}</span></div>
            <div class="mail-subject">${escapeHtml(m.subject)}</div>
            <div class="mail-snippet">${escapeHtml((m.snippet || '').slice(0, 140))}</div>
          `;
          container.appendChild(el);
        });
      }

      const todayTasks = state.tasks.filter(t => t.dueDate === today() && !['Listo','Cerrado','Completada','Hecha'].includes(t.status));
      $('count-hoy').textContent = todayTasks.length;
      const vencidas = state.tasks.filter(t => t.dueDate && t.dueDate < today() && !['Listo','Cerrado','Completada','Hecha'].includes(t.status));
      $('count-vencidas').textContent = vencidas.length;

      $('today-list').innerHTML = '';
      todayTasks.slice(0, 8).forEach(t => $('today-list').appendChild(renderTaskRow(t)));

      $('overdue-list').innerHTML = '';
      vencidas.slice(0, 8).forEach(t => $('overdue-list').appendChild(renderTaskRow(t)));

      $('urgent-list').innerHTML = '';
      state.tasks.filter(t => ['Crítica','Alta'].includes(t.priority) && !['Listo','Cerrado','Completada','Hecha'].includes(t.status)).slice(0, 8).forEach(t => $('urgent-list').appendChild(renderTaskRow(t)));
    }

    const sheet = $('sheet');
    $('fab').addEventListener('click', () => sheet.classList.add('open'));
    $('sheet-close').addEventListener('click', () => sheet.classList.remove('open'));
    $('sheet-cancel').addEventListener('click', () => sheet.classList.remove('open'));
    $('quick-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const title = $('q-title').value.trim();
      if (!title) return;
      const payload = { title, dueDate: $('q-date').value, priority: $('q-priority').value, status: 'Pendiente', category: 'Operaciones', assignee: '' };
      fetch('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).then(() => {
        sheet.classList.remove('open');
        $('q-title').value = '';
        loadData();
      }).catch(() => sheet.classList.remove('open'));
    });

    $('cal-prev').addEventListener('click', () => {
      state.calMonth--;
      if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
      renderCalendar();
    });
    $('cal-next').addEventListener('click', () => {
      state.calMonth++;
      if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
      renderCalendar();
    });

    loadData();
  </script>
</body>
</html>
