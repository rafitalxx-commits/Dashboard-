<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard Tareas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --panel: #0f172a;
      --panel-2: #111827;
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #1d4ed8;
      --accent-2: #60a5fa;
      --danger: #ef4444;
      --ok: #22c55e;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    .app-shell { display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 108px; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 16px; border-bottom: 1px solid var(--border); background: rgba(15,23,42,0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 10;
    }
    .brand { font-weight: 700; font-size: 18px; letter-spacing: 0.2px; }
    .top-actions { display: inline-flex; gap: 8px; }

    .segmented {
      display: inline-flex; gap: 8px; padding: 6px; border: 1px solid var(--border); border-radius: 999px; background: rgba(255,255,255,0.04);
    }
    .segmented button {
      border: none; background: transparent; color: inherit; padding: 8px 12px; border-radius: 999px; cursor: pointer; font-weight: 500; font-size: 14px; color: var(--muted);
    }
    .segmented button.active { background: var(--accent); color: white; }

    .page { padding: 16px; display: none; flex-direction: column; gap: 16px; }
    .page.active { display: flex; }

    .section { display: flex; flex-direction: column; gap: 10px; }
    .section-title { font-weight: 600; color: #e2e8f0; font-size: 15px; }

    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer;
      display: flex; flex-direction: column; gap: 6px;
    }
    .card:active { transform: scale(0.995); }

    .rows { display: flex; flex-direction: column; gap: 10px; }
    .row {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px;
      display: grid; grid-template-columns: 24px 1fr auto; gap: 10px; align-items: center; cursor: pointer;
    }
    .row input { width: 22px; height: 22px; accent-color: var(--accent); }
    .row-title { font-weight: 500; font-size: 14px; }
    .row-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; color: var(--muted); font-size: 12px; }

    .search { display: flex; gap: 10px; flex-wrap: wrap; }
    .search input, .input {
      width: 100%; background: var(--panel); color: inherit; border: 1px solid var(--border); padding: 12px 14px; border-radius: 10px; font-size: 16px;
    }

    .chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; align-items: center; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); white-space: nowrap; min-height: 40px; font-size: 14px; color: var(--muted);
    }
    .chip.active { background: var(--accent); border-color: var(--accent); color: white; }

    .fab {
      position: fixed; right: 18px; bottom: 84px; width: 56px; height: 56px; border-radius: 999px; border: none; background: var(--accent); color: white; font-size: 24px; line-height: 56px; text-align: center; box-shadow: 0 8px 24px rgba(29,78,216,0.35); cursor: pointer; z-index: 8;
    }

    .bottom-nav {
      position: fixed; left: 0; right: 0; bottom: 0; padding: env(safe-area-inset-bottom, 10px) 8px 10px; display: flex; justify-content: space-between; gap: 6px; border-top: 1px solid var(--border); background: rgba(15,23,42,0.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); z-index: 20;
    }
    .bottom-nav button {
      flex: 1; display: inline-flex; flex-direction: column; align-items: center; gap: 4px; border: none; background: transparent; color: var(--muted); padding: 10px 6px; min-height: 48px; font-size: 11px;
    }
    .bottom-nav button.active { color: var(--accent-2); }
    .bottom-nav button .label-text { font-size: 11px; }

    .empty-state { color: var(--muted); font-size: 14px; padding: 10px 0; }

    .mail-item { background: var(--panel); border: 1px solid var(--border); padding: 12px; border-radius: 10px; cursor: pointer; }
    .mail-item-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .mail-from { color: var(--text); font-weight: 600; }
    .mail-subject { font-weight: 600; color: var(--text); margin-top: 6px; }
    .mail-snippet { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .quick-actions { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .quick-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; text-align: left;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .quick-title { font-weight: 600; color: var(--text); }
    .quick-count { font-weight: 700; color: var(--warn); font-size: 18px; }

    .attach-card { display: flex; justify-content: space-between; align-items: center; gap: 8px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 10px; border-radius: 10px; font-size: 13px; color: var(--text); }
    .upload-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px; border: 1px dashed var(--border); color: var(--muted); font-size: 13px; cursor: pointer; background: rgba(255,255,255,0.02); }

    .sheet-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.72); display: none; align-items: flex-end; justify-content: center; padding-bottom: env(safe-area-inset-bottom, 12px); z-index: 12; }
    .sheet-backdrop.open { display: flex; }
    .sheet { background: #0b1120; border: 1px solid var(--border); border-radius: 14px 14px 0 0; width: 100vw; max-width: 100vw; padding: 18px; display: flex; flex-direction: column; gap: 12px; max-height: 92vh; overflow-y: auto; }
    .sheet-header { font-weight: 700; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
    .actions { display: flex; justify-content: stretch; gap: 10px; }
    .actions .button { flex: 1; text-align: center; }
    .button, .ghost {
      border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: inherit; padding: 12px 14px; border-radius: 10px; cursor: pointer; min-height: 44px; font-size: 15px;
    }
    .button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .close { border: none; background: transparent; color: inherit; font-size: 18px; padding: 4px 8px; border-radius: 8px; }

    .calendar { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; color-scheme: dark; }
    .calendar-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .calendar-head h3 { margin: 0; font-size: 14px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .dow { text-align: center; font-size: 10px; color: var(--muted); padding-bottom: 4px; }
    .day {
      aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--border);
      background: #0c0f14; padding: 6px; display: flex; flex-direction: column; gap: 3px; overflow: hidden;
    }
    .day:hover { border-color: rgba(255,255,255,0.25); }
    .day.empty { background: transparent; border-color: transparent; }
    .day-num { font-size: 11px; color: var(--muted); }
    .ev {
      font-size: 10px; padding: 2px 4px; border-radius: 4px;
      background: rgba(37,99,235,0.25); color: #e5eaff;
      border: 1px solid rgba(37,99,235,0.35);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .day-events { display: flex; flex-wrap: wrap; gap: 2px; overflow: hidden; }

    .hint { color: var(--muted); font-size: 12px; margin-top: 8px; }

    .mail-panel { display: flex; flex-direction: column; gap: 12px; }
    .mail-accounts { display: flex; gap: 8px; flex-wrap: wrap; }
    .mail-account { border: 1px solid var(--border); background: rgba(255,255,255,0.04); padding: 10px 12px; border-radius: 10px; color: var(--text); min-width: 140px; }
    .mail-account.active { border-color: var(--accent-2); }
    .mail-account-name { font-weight: 600; font-size: 13px; }
    .mail-account-email { font-size: 12px; color: var(--muted); }

    .composer { display: flex; flex-direction: column; gap: 10px; }
    .composer-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .composer-actions .button { flex: 1; }
    .reply-preview { background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
    .reply-snippet { color: var(--muted); font-size: 12px; }

    .mail-list { display: flex; flex-direction: column; gap: 10px; }
    .mail-row { background: var(--panel); border: 1px solid var(--border); padding: 12px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
    .mail-row-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .mail-row-subject { font-weight: 600; color: var(--text); }
    .mail-row-snippet { color: var(--muted); font-size: 13px; }

    .chat-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .chat-history { display: flex; flex-direction: column; gap: 10px; max-height: 220px; overflow-y: auto; }
    .chat-msg { display: flex; flex-direction: column; gap: 4px; }
    .chat-msg .bubble { padding: 10px 12px; border-radius: 12px; font-size: 14px; max-width: 85%; word-wrap: break-word; }
    .chat-msg.user .bubble { align-self: flex-end; background: var(--accent); color: white; }
    .chat-msg.hermes .bubble { align-self: flex-start; background: rgba(255,255,255,0.06); border: 1px solid var(--border); }
    .chat-msg .at { font-size: 11px; color: var(--muted); }
    .chat-form { display: flex; gap: 10px; }
    .chat-form input { flex: 1; }

    @media (min-width: 640px) {
      .quick-actions { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="brand">Tareas</div>
        <div style="color:var(--muted);font-size:12px">Prototipo · Dark</div>
      </div>
      <div class="top-actions">
        <div class="segmented">
          <button class="active" data-view="lista">Lista</button>
          <button data-view="calendario">Calendario</button>
        </div>
      </div>
    </header>

    <main>
      <section id="inicio" class="page active">
        <div class="section">
          <div class="section-title">Correo</div>
          <div id="inbox-list" class="mail-list">Cargando correo...</div>
        </div>
        <div class="section">
          <div class="section-title">Accesos directos</div>
          <div class="quick-actions">
            <button class="quick-card" id="qa-today">
              <span class="quick-title">Tareas de hoy</span>
              <span class="quick-count" id="count-hoy">0</span>
            </button>
            <button class="quick-card" id="qa-overdue">
              <span class="quick-title">Vencidas</span>
              <span class="quick-count" id="count-vencidas">0</span>
            </button>
            <button class="quick-card" id="qa-calendar">
              <span class="quick-title">Calendario</span>
            </button>
          </div>
        </div>
        <div class="section">
          <div class="section-title">Tareas de hoy</div>
          <div id="today-list" class="rows"></div>
        </div>
        <div class="section">
          <div class="section-title">Vencidas</div>
          <div id="overdue-list" class="rows"></div>
        </div>
        <div class="section">
          <div class="section-title">Chat Hermes</div>
          <div class="chat-panel" id="chat-panel">
            <div class="chat-history" id="chat-history">
              <div class="empty-state">Sin mensajes todavia.</div>
            </div>
            <form class="chat-form" id="chat-form">
              <input id="chat-input" placeholder="Mensaje para Hermes" />
              <button class="button primary" type="submit">Enviar</button>
            </form>
          </div>
        </div>
      </section>

      <section id="tareas" class="page">
        <div class="section">
          <div class="search">
            <input id="search-input" placeholder="Buscar tarea, proyecto o responsable..." />
          </div>
          <div class="chips" id="filter-chips"></div>
        </div>
        <div id="tasks-list" class="rows">Cargando tareas...</div>
      </section>

      <section id="calendario" class="page">
        <div class="calendar">
          <div class="calendar-head">
            <button class="ghost" id="cal-prev">Anterior</button>
            <h3 id="cal-title">Julio 2026</h3>
            <button class="ghost" id="cal-next">Siguiente</button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
          <div id="calendar-events" class="rows" style="margin-top:12px"></div>
          <div class="hint">Calendario oscuro sincronizado.</div>
        </div>
      </section>
    </main>

    <button class="fab" id="fab" type="button">+</button>
    <nav class="bottom-nav" id="bottom-nav">
      <button class="active" data-tab="inicio"><span class="label-text">Inicio</span></button>
      <button data-tab="tareas"><span class="label-text">Tareas</span></button>
      <button data-tab="calendario"><span class="label-text">Calendario</span></button>
      <button data-tab="proyectos"><span class="label-text">Proyectos</span></button>
      <button data-tab="equipo"><span class="label-text">Equipo</span></button>
    </nav>
  </div>

  <div id="sheet-backdrop" class="sheet-backdrop">
    <form class="sheet" id="quick-form">
      <div class="sheet-header">
        <span>Creacion rapida</span>
        <button class="ghost close" id="sheet-close" type="button">Cerrar</button>
      </div>
      <label style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted)">
        Tipo
        <select class="input" id="q-type">
          <option value="task">Tarea</option>
          <option value="event">Evento</option>
          <option value="mail">Correo</option>
        </select>
      </label>
      <input class="input" id="q-title" placeholder="Tarea / Asunto" />
      <textarea class="input" id="q-detail" placeholder="Indicaciones, bloqueo o siguiente paso" rows="3"></textarea>
      <div id="q-task-fields" style="display:flex;gap:10px;flex-wrap:wrap">
        <label style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted)">
          Fecha limite
          <input class="input" id="q-date" type="date" />
        </label>
        <label style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted)">
          Prioridad
          <select class="input" id="q-priority">
            <option>Alta</option><option selected>Media</option><option>Baja</option>
          </select>
        </label>
      </div>
      <div id="q-event-fields" style="display:none;gap:10px;flex-wrap:wrap;flex-direction:column">
        <input class="input" id="q-start" type="datetime-local" placeholder="Inicio" />
        <input class="input" id="q-end" type="datetime-local" placeholder="Fin" />
        <input class="input" id="q-location" placeholder="Ubicacion" />
      </div>
      <div class="actions">
        <button class="ghost" id="sheet-cancel" type="button">Cancelar</button>
        <button class="button primary" type="submit">Guardar</button>
      </div>
    </form>
  </div>

  <div id="mail-backdrop" class="sheet-backdrop">
    <div class="sheet mail-panel">
      <div class="sheet-header">
        <span>Correo</span>
        <button class="ghost close" id="mail-close" type="button">Cerrar</button>
      </div>
      <div class="mail-accounts" id="mail-accounts"></div>
      <div class="actions">
        <button class="button primary" id="mail-new" type="button">Nuevo correo</button>
        <button class="ghost" id="mail-clear" type="button">Limpiar</button>
      </div>
      <div id="mail-body"></div>
    </div>
  </div>

  <script>
    const API = '';
    const state = { tab: 'inicio', filter: 'todos', query: '', tasks: [], inbox: [], mailAccount: 0, chat: [], calendars: [] };
    const $ = id => document.getElementById(id);

    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function switchTab(tab){ state.tab = tab; document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === tab)); document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab)); if(tab === 'calendario') renderCalendar(); if(tab === 'tareas') renderTasks(); if(tab === 'inicio') renderInicio(); }

    function today(){ return new Date().toISOString().slice(0,10); }
    function shift(days){ const d = new Date(); d.setDate(d.getDate() + days); return d.toISOString().slice(0,10); }

    document.getElementById('bottom-nav').addEventListener('click', e => { const b = e.target.closest('button[data-tab]'); if(!b) return; switchTab(b.dataset.tab); });
    document.querySelector('.segmented').addEventListener('click', e => { const b = e.target.closest('button[data-view]'); if(!b) return; document.querySelectorAll('.segmented button').forEach(x => x.classList.toggle('active', x === b)); switchTab(b.dataset.view === 'calendario' ? 'calendario' : 'tareas'); });

    $('fab').addEventListener('click', () => { $('sheet-backdrop').classList.add('open'); });
    $('sheet-close').addEventListener('click', () => $('sheet-backdrop').classList.remove('open'));
    $('sheet-cancel').addEventListener('click', () => $('sheet-backdrop').classList.remove('open'));

    $('quick-form').addEventListener('submit', async e => {
      e.preventDefault();
      const type = $('q-type').value;
      const title = $('q-title').value.trim();
      const detail = $('q-detail').value.trim();
      if(!title && type !== 'mail') return;
      if(type === 'task'){
        const payload = { title, detail, status: 'Pendiente', category: 'Operaciones', priority: $('q-priority').value || 'Media', dueDate: $('q-date').value || today(), reminderAt: '' };
        await fetch('/api/tasks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      } else if(type === 'event'){
        const payload = { title, detail, startsAt: ($('q-start').value || today()+'T09:00'), endsAt: ($('q-end').value || today()+'T10:00'), location: '' };
        await fetch('/api/calendar/events', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      } else if(type === 'mail'){
        openMailCompose({ to:'', subject: title, body: detail });
      }
      $('q-title').value = ''; $('q-detail').value = ''; $('sheet-backdrop').classList.remove('open');
      loadAll();
    });

    $('q-type').addEventListener('change', e => {
      const isMail = e.target.value === 'mail';
      $('q-title').placeholder = isMail ? 'Asunto' : 'Tarea / Evento';
      $('q-task-fields').style.display = e.target.value === 'task' ? 'flex' : 'none';
      $('q-event-fields').style.display = e.target.value === 'event' ? 'flex' : 'none';
    });

    $('search-input').addEventListener('input', e => { state.query = e.target.value; renderTasks(); });

    function applyFilter(f){ state.filter = f; document.querySelectorAll('#filter-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f)); renderTasks(); }

    async function loadAll(){ await Promise.all([loadTasks(), loadInbox(), loadCalendar()]); renderInicio(); renderTasks(); if(state.tab === 'calendario') renderCalendar(); }
    async function loadTasks(){ try { const r = await fetch('/api/tasks'); const d = await r.json(); state.tasks = Array.isArray(d) ? d : (d.tasks || []); } catch { state.tasks = []; } }
    async function loadInbox(){ try { const r = await fetch('/api/inbox'); const d = await r.json(); state.inbox = d.messages || []; } catch { state.inbox = []; } renderInbox(); }
    async function loadCalendar(){ try { const r = await fetch('/api/calendar/events'); state.calendars = await r.json(); } catch { state.calendars = []; } }

    function renderInbox(){
      const c = $('inbox-list'); c.innerHTML = '';
      const list = state.inbox.slice(0,10);
      if(!list.length){ c.innerHTML = '<div class="empty-state">No hay correos.</div>'; return; }
      list.forEach(m => {
        const el = document.createElement('div'); el.className = 'mail-item';
        el.innerHTML = `<div class="mail-item-header"><span class="mail-from">${escapeHtml(m.from)}</span><span>${escapeHtml(m.date)}</span></div><div class="mail-subject">${escapeHtml(m.subject)}</div><div class="mail-snippet">${escapeHtml(m.snippet)}</div>`;
        el.addEventListener('click', () => openMailCompose({ to: extractEmail(m.from), subject: 'Re: ' + m.subject, body: m.snippet || '' }));
        c.appendChild(el);
      });
    }

    function extractEmail(from){ const m = String(from).match(/<(.+)>/); return m ? m[1] : from; }

    const mailState = { composing: false, to:'', subject:'', body:'', draftSaved: false };
    function openMailCompose({to = '', subject = '', body = ''}){
      mailState.composing = true; mailState.to = to; mailState.subject = subject; mailState.body = body; mailState.draftSaved = false;
      $('mail-backdrop').classList.add('open');
      renderMailComposer();
    }
    function renderMailComposer(){
      const c = $('mail-body');
      c.innerHTML = `
        <div class="composer">
          <label style="font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:6px">Para <input class="input" id="compose-to" value="${escapeHtml(mailState.to)}" /></label>
          <label style="font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:6px">Asunto <input class="input" id="compose-subject" value="${escapeHtml(mailState.subject)}" /></label>
          <label style="font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:6px">Mensaje <textarea class="input" id="compose-body" rows="5">${escapeHtml(mailState.body)}</textarea></label>
          <div class="attach-card"><span>Adjuntos (prototipo localStorage)</span><label class="upload-btn"><input type="file" id="compose-files" multiple /> Adjuntar</label></div>
          <div id="compose-files-list"></div>
          <div class="composer-actions">
            <button class="button primary" id="compose-send" type="button">Enviar</button>
            <button class="ghost" id="compose-draft" type="button">Guardar borrador</button>
            <button class="ghost" id="compose-reply-all" type="button">Responder a todos</button>
            <button class="ghost" id="compose-cancel" type="button">Cancelar</button>
          </div>
        </div>
      `;
      bindComposerEvents();
    }
    function bindComposerEvents(){
      $('compose-send').addEventListener('click', async () => {
        const payload = { to: $('compose-to').value, subject: $('compose-subject').value, body: $('compose-body').value };
        const r = await fetch('/api/mail/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        if(r.ok){ alert('Correo enviado'); mailState.composing = false; $('mail-backdrop').classList.remove('open'); }
        else alert('No se pudo enviar');
      });
      $('compose-draft').addEventListener('click', async () => {
        const payload = { to: $('compose-to').value, subject: $('compose-subject').value, body: $('compose-body').value };
        const r = await fetch('/api/mail/draft', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        if(r.ok){ alert('Borrador guardado'); mailState.draftSaved = true; }
        else alert('No se pudo guardar');
      });
      $('compose-reply-all').addEventListener('click', async () => {
        const payload = { to: $('compose-to').value, subject: 'Re: ' + ($('compose-subject').value || ''), body: $('compose-body').value, replyAll: true };
        await fetch('/api/mail/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        alert('Responder a todos: prototipo');
      });
      $('compose-cancel').addEventListener('click', () => { mailState.composing = false; $('mail-backdrop').classList.remove('open'); });
      $('compose-files')?.addEventListener('change', e => { const arr = Array.from(e.target.files || []).map(f => ({name: f.name, size: f.size})); $('compose-files-list').innerHTML = arr.map(a => `<div class="attach-card"><span>${escapeHtml(a.name)}</span><span>${a.size} B</span></div>`).join(''); });
    }
    $('mail-close').addEventListener('click', () => { mailState.composing = false; $('mail-backdrop').classList.remove('open'); });
    $('mail-new').addEventListener('click', () => openMailCompose({ to:'', subject:'', body:'' }));
    $('mail-clear').addEventListener('click', () => { $('mail-body').innerHTML = ''; mailState.composing = false; });

    $('qa-today').addEventListener('click', () => { switchTab('tareas'); applyFilter('hoy'); });
    $('qa-overdue').addEventListener('click', () => { switchTab('tareas'); applyFilter('vencidas'); });
    $('qa-calendar').addEventListener('click', () => switchTab('calendario'));

    function renderCalendar(){
      const container = $('calendar-grid');
      const evts = state.calendars || [];
      const [y,m] = [new Date().getFullYear(), new Date().getMonth()];
      const first = new Date(y, m, 1); const daysIn = new Date(y, m+1, 0).getDate(); const startWeekday = (first.getDay()+6)%7;
      const map = new Map(); evts.forEach(ev => { const k = (ev.startsAt || '').slice(0,10); if(!map.has(k)) map.set(k, []); map.get(k).push(ev); });
      const days = []; for(let i=0;i<startWeekday;i++) days.push({d:'', outside:true}); for(let i=1;i<=daysIn;i++){ const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`; days.push({d:i, date:ds, events: map.get(ds) || []}); }
      const remaining = 42 - days.length; for(let i=1;i<=remaining;i++) days.push({d:i, outside:true});
      $('cal-title').textContent = `${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][m]} ${y}`;
      container.innerHTML = days.map(day => {
        const cls = `day ${day.outside ? 'empty' : ''}`;
        const evHtml = (day.events || []).map(ev => `<div class="ev">${escapeHtml(ev.title)}</div>`).join('');
        return `<button class="${cls}" type="button"><div class="day-num">${day.d}</div><div class="day-events">${evHtml}</div></button>`;
      }).join('');
      const evs = evts.filter(ev => (ev.startsAt || '').startsWith(`${y}-${String(m+1).padStart(2,'0')}`));
      $('calendar-events').innerHTML = evs.map(ev => `<div class="row"><div><div class="row-title">${escapeHtml(ev.title)}</div><div class="row-meta">${ev.startsAt ? escapeHtml(ev.startsAt.slice(11,16)) : ''}</div></div></div>`).join('');
    }
    $('cal-prev').addEventListener('click', () => { const d = new Date(state.calYear, state.calMonth - 1, 1); state.calYear = d.getFullYear(); state.calMonth = d.getMonth(); renderCalendar(); });
    $('cal-next').addEventListener('click', () => { const d = new Date(state.calYear, state.calMonth + 1, 1); state.calYear = d.getFullYear(); state.calMonth = d.getMonth(); renderCalendar(); });

    function renderTaskRow(task){
      const row = document.createElement('div'); row.className = 'row';
      const checked = ['Listo','Cerrado','Completada','Hecha'].includes(task.status);
      row.innerHTML = `<input type="checkbox" ${checked ? 'checked' : ''}><div><div class="row-title" style="${checked ? 'text-decoration:line-through;color:var(--muted)' : ''}">${escapeHtml(task.title)}</div><div class="row-meta"><span class="chip">${escapeHtml(task.category || 'Operaciones')}</span><span class="chip">${escapeHtml(task.priority || 'Media')}</span>${task.dueDate ? `<span>${task.dueDate}</span>` : ''}</div></div><button class="chip">${escapeHtml(task.status)}</button>`;
      row.addEventListener('click', e => { if(e.target.tagName === 'INPUT') return; });
      return row;
    }
    function renderTasks(){
      const container = $('tasks-list'); container.innerHTML = '';
      const q = state.query.trim().toLowerCase();
      let list = state.tasks.filter(t => {
        if(state.filter !== 'todos' && !((state.filter==='hoy' && t.dueDate===today()) || (state.filter==='vencidas' && t.dueDate && t.dueDate < today() && !['Listo','Cerrado','Completada','Hecha'].includes(t.status)) || (state.filter==='urgentes' && ['Crítica','Alta'].includes(t.priority)) || (state.filter==='completadas' && ['Listo','Cerrado','Completada','Hecha'].includes(t.status)))) return false;
        if(q){ const h=`${t.title} ${t.detail} ${t.assignee || ''} ${t.category || ''}`.toLowerCase(); if(!h.includes(q)) return false; }
        return true;
      });
      list.forEach(t => container.appendChild(renderTaskRow(t)));
      if(!list.length) container.innerHTML = '<div class="empty-state">No hay tareas.</div>';
    }

    function renderInicio(){
      const todayList = $('today-list'); todayList.innerHTML = '';
      const overdueList = $('overdue-list'); overdueList.innerHTML = '';
      const tasks = state.tasks;
      const todayItems = tasks.filter(t => t.dueDate === today() && !['Listo','Cerrado','Completada','Hecha'].includes(t.status));
      const overdueItems = tasks.filter(t => t.dueDate && t.dueDate < today() && !['Listo','Cerrado','Completada','Hecha'].includes(t.status));
      $('count-hoy').textContent = todayItems.length;
      $('count-vencidas').textContent = overdueItems.length;
      todayItems.forEach(t => todayList.appendChild(renderTaskRow(t)));
      overdueItems.forEach(t => overdueList.appendChild(renderTaskRow(t)));
    }

    const chatMessages = [];
    function addChat(from, text){
      chatMessages.push({ id: Date.now() + Math.random(), from, text, at: new Date().toLocaleTimeString() });
      const h = $('chat-history'); h.innerHTML = '';
      chatMessages.slice(-50).forEach(m => {
        const el = document.createElement('div'); el.className = 'chat-msg ' + m.from;
        el.innerHTML = `<div class="bubble">${escapeHtml(m.text)}</div><div class="at">${m.at}</div>`;
        h.appendChild(el);
      });
      h.scrollTop = h.scrollHeight;
    }
    $('chat-form').addEventListener('submit', async e => {
      e.preventDefault();
      const text = $('chat-input').value.trim(); if(!text) return; $('chat-input').value = '';
      addChat('user', text);
      try {
        const r = await fetch('/api/telegram/send-hermes', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ text }) });
        const d = await r.json();
        addChat('hermes', d.reply || 'Prototipo sin respuesta');
      } catch { addChat('hermes', 'Prototipo sin backend'); }
    });

    loadAll();
  </script>
</body>
</html>
